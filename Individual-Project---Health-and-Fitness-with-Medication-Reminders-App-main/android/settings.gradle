plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '1.0.0'
}// Patching capacitor-health to fix deprecated proguard-android.txt usage
def healthBuildGradle = new File(settingsDir, '../node_modules/capacitor-health/android/build.gradle')
if (healthBuildGradle.exists()) {
    def content = healthBuildGradle.text
    if (content.contains("'proguard-android.txt'")) {
        healthBuildGradle.text = content.replace("'proguard-android.txt'", "'proguard-android-optimize.txt'")
    }
}

include ':app'
include ':capacitor-cordova-android-plugins'
project(':capacitor-cordova-android-plugins').projectDir = new File('./capacitor-cordova-android-plugins/')

apply from: 'capacitor.settings.gradle'
